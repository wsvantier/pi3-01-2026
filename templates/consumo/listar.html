{% extends "base.html" %}
{% block body %}
<h3> Consumo </h3>

<a href="{{url_for('routes_bp.form_consumo')}}"> Inserir Consumo</a>

<table border="1">
    <thead>
        <tr>
            <td> Gênero Alimentício</td>
            <td> Quantidade </td>
            <td> Data </td>
            <td> Refeição </td>
            <td> Responsável </td>
        </tr>
    </thead>
    <tbody id="tabela-consumo">
        <!-- Conteúdo inserido via JS -->
    </tbody>
</table>

<script>
    async function carregarConsumo() {
        try {
            const response = await fetch("/api/consumo");
            const dados = await response.json();

            const tbody = document.getElementById("tabela-consumo");
            tbody.innerHTML = "";

            if (dados.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5'>Nenhum consumo registrado</td></tr>";
                return;
            }

            dados.forEach(item => {
                const linha = `
                    <tr>
                        <td>${item.produto}</td>
                        <td>${item.quantidade}</td>
                        <td>${item.data}</td>
                        <td>${item.refeicao || '-'}</td>
                        <td>${item.responsavel || '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += linha;
            });

        } catch (erro) {
            console.error("Erro ao carregar consumo:", erro);
        }
    }

    carregarConsumo();
</script>

{% endblock %}
